name: Scheduled Dataset Refresh Placeholder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  plan-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: champions-dataset --phase all --dry-run

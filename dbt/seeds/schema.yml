version: 2

seeds:
  - name: opgg_key_to_pokeapi_form
    description: >
      Controlled name/form mapping (dataset-spec.md's OP.GG mapping rule:
      "Join to canonical records by numeric ID where available. Fall back
      to controlled name/form mappings when direct ID mapping is absent")
      from every OP.GG `source_record_id` key to PokéAPI's `form_name`
      slug. Used for all OP.GG rows, not just the ones with a fabricated
      (null-`pokemon_id`) key: OP.GG's numeric id alone doesn't disambiguate
      species with no single default PokéAPI slug (e.g. "pyroar", "lycanroc",
      "gourgeist-average"), so name-based resolution is more precise even
      when a real id is present.

      Built by fetching PokéAPI's full /pokemon list and matching each
      OP.GG key against it: first a direct match (most keys already equal a
      real PokéAPI slug), then narrow verified transforms — reordering
      OP.GG's `mega-<species>[-x|-y]` prefix into PokéAPI's
      `<species>-mega[-x|-y]` suffix convention, renaming OP.GG's
      `-alolan`/`-galarian`/`-hisuian` regional suffixes to PokéAPI's
      `-alola`/`-galar`/`-hisui`, stripping literal periods (e.g.
      "mr.-rime" -> "mr-rime"), and two explicit overrides (Paldean
      Tauros's `-breed` forms; "floette-eternal-flower" ->
      "floette-eternal") — then, for keys ending in `-female`/`-male` or
      bare species names that still don't resolve, the species' PokéAPI-
      designated `is_default: true` variety (queried via
      /pokemon-species/{name}), e.g. OP.GG's "vileplume-female" and
      "pyroar" both resolve through this path since PokéAPI doesn't model
      those as separate forms. Every row was confirmed against live
      PokéAPI data; no fuzzy/heuristic matches were kept. 316/317 OP.GG
      legal-pool keys resolved. One key (`mega-meowstic`) was left out:
      PokéAPI has both `meowstic-male-mega` and `meowstic-female-mega` and
      OP.GG's key doesn't disambiguate, so no override was added rather
      than guess.
    columns:
      - name: opgg_key
        description: OP.GG's source_record_id for the unmapped row.
      - name: pokeapi_form_name
        description: The matching form_name in stg_pokeapi/pokemon.

  - name: munchstats_name_to_pokeapi_form
    description: >
      Controlled name/form mapping (dataset-spec.md's MunchStats "map roster
      Pokémon names to canonical pokemon_id and pokemon_key" rule) from every
      distinct `pokemon_name` value in stg_munchstats to PokéAPI's
      `form_name` slug.

      Built the same way as opgg_key_to_pokeapi_form: fetch PokéAPI's live
      /pokemon list, normalize each MunchStats name (lowercase; spaces and
      periods to hyphens, e.g. "Flutter Mane" -> "flutter-mane", "Mr. Rime"
      -> "mr-rime"), then confirm the result is a real PokéAPI slug. Two
      further verified rule sets handle names that don't resolve after that:
      1) an explicit override table for MunchStats names whose slug doesn't
      match PokéAPI's own naming for that form (e.g. "Necrozma-Dusk-Mane" ->
      "necrozma-dusk", "Tauros-Paldea-Aqua" -> "tauros-paldea-aqua-breed",
      "Maushold-Three" -> "maushold-family-of-three"); 2) for MunchStats
      names that are a bare species with no single matching PokéAPI slug
      (e.g. "Giratina", "Urshifu", "Meowstic" — PokéAPI splits these into
      named sub-forms with no bare-species entry), resolve to the form
      PokéAPI itself flags `is_default: true` for that species (queried via
      /pokemon-species/{name}), e.g. "Giratina" -> "giratina-altered". Every
      row was confirmed against live PokéAPI data; 500/500 distinct
      MunchStats names resolved (100% row-level coverage).
    columns:
      - name: munchstats_pokemon_name
        description: stg_munchstats.pokemon_name value.
      - name: pokeapi_form_name
        description: The matching form_name in stg_pokeapi/pokemon.

  - name: bulbagarden_title_to_pokeapi_form
    description: >
      Controlled name/form mapping (docs/dataset-spec.md's Bulbagarden
      Archives mapping rule) from every `bulbagarden_title` in
      stg_bulbagarden to PokéAPI's `form_name` slug. Bulbagarden's own
      title convention ("Menu CP <4-digit dex number>[-<Form descriptor>]")
      is not the same token set as OP.GG's or PokéAPI's own form-suffix
      naming (e.g. Bulbagarden's "Alola"/"Paldea Aqua" vs. PokéAPI's
      "-alola"/"-paldea-aqua-breed"), so this is a dedicated seed rather
      than a reuse of opgg_key_to_pokeapi_form.

      Built by fetching the live 359-title category inventory plus
      PokéAPI's full /pokemon list and /pokemon-species data, then: 1) a
      direct match on `<base species slug>-<slugified form descriptor>`
      for the majority of titles; 2) explicit overrides for species whose
      PokéAPI default variety isn't the bare species slug (e.g. Pyroar's
      default is `pyroar-male`, not `pyroar`; Paldean Tauros forms need a
      `-breed` suffix PokéAPI adds that Bulbagarden's title doesn't
      signal); 3) cosmetic-only species (Vivillon's 20 wing patterns,
      Florges's 5 colors, Furfrou's 9 trims, Alcremie's 8 cream flavors) —
      confirmed via live /pokemon-species queries to have exactly one
      PokéAPI variety despite many visually distinct Bulbagarden sprites —
      map every one of that species' titles onto the same single
      `pokeapi_form_name`; int_bulbagarden_mapped.sql dedupes these down to
      one asset row per pokemon_key, the same treatment
      int_opgg_champions_mapped.sql already gives OP.GG's cosmetic
      male/female duplicates.

      One title was left out rather than guessed, matching
      opgg_key_to_pokeapi_form's precedent for the identical case: "File:Menu
      CP 0678-Mega.png" (Mega Meowstic) is ambiguous between PokéAPI's
      `meowstic-male-mega`/`meowstic-female-mega` and Bulbagarden's title
      doesn't disambiguate, so no override was added. 358/359 titles
      resolved (99.7%); every mapped row was confirmed against live
      PokéAPI data, no fuzzy/heuristic matches were kept.
    columns:
      - name: bulbagarden_title
        description: stg_bulbagarden.bulbagarden_title value.
      - name: pokeapi_form_name
        description: The matching form_name in stg_pokeapi/pokemon.

  - name: pokeapi_move_types
    description: >
      Static move-name-to-type reference table, sourced once from PokéAPI's
      GitHub `data/v2/csv/moves.csv` + `types.csv` (already cataloged in
      docs/data-sources.md's PokéAPI entry but not otherwise ingested by
      this pipeline). Used only by pipelines/render/ to color a team card's
      move rows by type — not part of the pokemon/tournament_* entity
      graph, so it isn't referenced by any normalized model, dataset-spec.md
      entity, or release gate; the renderer reads it directly via
      csv.DictReader. All 937 PokéAPI moves are included, joined by
      display name (e.g. "double-slap" -> "Double Slap") for exact-match
      lookup against tournament roster move strings.
    columns:
      - name: move_name
        description: Move display name, Title Case (e.g. "Ice Punch").
      - name: move_type
        description: Move's type, lowercase (e.g. "ice").

  - name: pokebase_slug_to_pokeapi_form
    description: >
      Controlled name/form mapping from every distinct `form_name` (slug)
      value in stg_pokebase to PokéAPI's `form_name` slug. PokéBase's own
      slug convention already matches PokéAPI's directly for the large
      majority of entries (e.g. `charizard-mega-x`), so most rows here are
      an identity mapping confirmed against PokéAPI's live list; 8 more are
      the same "bare species with no default-equals-species-name PokéAPI
      form" gap solved for OP.GG/MunchStats, resolved via PokéAPI's
      `is_default: true` variety per species (e.g. "gourgeist" ->
      "gourgeist-average"). Four keys were left out rather than guessed or
      double-counted: "meowstic-mega" (ambiguous between
      `meowstic-male-mega`/`meowstic-female-mega`), "tauros-paldea"
      (ambiguous between the three Paldean Tauros breed forms), and
      "aegislash"/"lycanroc" (unlike the other bare-species cases,
      PokéBase separately lists their default sub-form directly —
      `aegislash-shield`, `lycanroc-midday` — as its own entry, so mapping
      the bare name too would map two distinct PokéBase rows onto the same
      pokemon_key).
    columns:
      - name: pokebase_slug
        description: stg_pokebase.form_name value.
      - name: pokeapi_form_name
        description: The matching form_name in stg_pokeapi/pokemon.
